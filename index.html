<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipauba Lanche</title>
    <link rel="stylesheet" href="style/index.css">

</head>

<body>
    <!--CABEÇALHO/MENU-->
    <header>


        <NAV>
            <button class="btn-home~>">
                <img src="assets/casa.png" alt="Logo do Sipauba Lanche">
                Home
            </button>


            <button class="btn-home~>">
                <img src="assets/descontos.png" alt="Logo do Sipauba Lanche">
                Promoçoes
            </button>
            <button class="btn-home~>">
                <img src="assets/sacola.png" alt="Logo do Sipauba Lanche">
                Pedidos
            </button>

            <button class="btn-home~>">
                <img src="assets/usuario.png" alt="Logo do Sipauba Lanche">
                Entrar/Cadastrar

            </button>

        </NAV>
    </header>

    <!--BANNER-->
    <div class="banner">
        <div class="imagens-banner">
            <div class="imagem1">
                <img src="assets/cupom.png" alt="Imagem do Banner 1">
            </div>
        </div>
        <div class="botoes-banner">
           
            <button class="btn-anterior">ANTERIOR</button>
            <button class="btn-proximo">PRÓXIMO</button>
        </div>

    </div>
    <!--FINALIZAÇÃO DA ÁREA DO BANNER DA LOJA-->

    <!--ÁREA DE OFERTAS -->
    <section class="ofertas">
        <div class="titulos-ofertas">
            <div class="texto-promoções">
                <h2> OFERTAS IMPERDÍVEIS</h2>
                <p>Confira as melhores ofertas!</p>
            </div>
            <a href="#" class="ver-tudo">Ver Tudo</a>
        </div>

        <div class="lista de produtos">
            <div class="card-produtos">
            <div class="imagem-botao">
                <img src="assets/produto 1.png" alt="Produto 1">
                <button class="favorito">
                    <img src="assets/coracao.png" alt="Ícone de favorito">
                </button>
            </div>
            <h3>Nome do Produto</h3>
            <div class="precos">
                <p class="p-antigo"> R$ 199,99</p>
                <p class="p-promocional"> R$ 99,99</p>
            </div>
            <button class="btn-adicionar">
                <img src="assets/carrinho.png" alt="Ícone de carrinho">

            </button>
        </div>
        </div>

    </section>

    <!--ÁREA DE OFERTAS -->
    <section class="ofertas">
        <div class="titulos-ofertas">
            <div class="texto-promoções">
                <h2> OFERTAS IMPERDÍVEIS</h2>

            </div>

        </div>

        <div class="lista de produtos">

                <img src="assets/produto 1.png" alt="Produto 1">
                <button class="favorito">
                    <img src="assets/coracao.png" alt="Ícone de favorito">
                </button>
            </div>
            <h3>Nome do Produto</h3>
            <div class="precos">
                <p class="p-antigo"> R$ 199,99</p>
                <p class="p-promocional"> R$ 99,99</p>
            </div>
            <button class="btn-adicionar">
                <img src="assets/carrinho.png" alt="Ícone de carrinho">

            </button>
        </div>
        </div>

    </section>



</body>

</html>
